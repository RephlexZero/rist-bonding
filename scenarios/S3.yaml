name: S3-link-outage
description: "Link outage simulation - one link at a time drops for 10-15s then restores"
duration_sec: 70
acceptance_criteria:
  delivered_bitrate_pct: 80  # Slightly lower due to outages
  loss_after_recovery_pct: 1.5
  max_stall_ms: 500
  utilization_balance_threshold: 0.65
  recovery_time_ms: 3000  # Max time to reach 80% of steady-state after restoration

links:
  - id: 1
    schedule:
      - time_sec: 0
        rate_kbps: 1000
        loss_pct: 0.8
        latency_ms: 30
        jitter_ms: 10
        
  - id: 2
    schedule:
      - time_sec: 0
        rate_kbps: 1000
        loss_pct: 0.8
        latency_ms: 30
        jitter_ms: 10
        
  - id: 3
    schedule:
      - time_sec: 0
        rate_kbps: 1000
        loss_pct: 0.8
        latency_ms: 30
        jitter_ms: 10
        
  - id: 4
    schedule:
      - time_sec: 0
        rate_kbps: 1000
        loss_pct: 0.8
        latency_ms: 30
        jitter_ms: 10

# Outage events (complete link failures)
outage_events:
  - time_sec: 10
    link_id: 1
    duration_sec: 12
    comment: "Link 1 complete outage"
    
  - time_sec: 30
    link_id: 2
    duration_sec: 10
    comment: "Link 2 complete outage"
    
  - time_sec: 48
    link_id: 3
    duration_sec: 15
    comment: "Link 3 complete outage"
    
  - time_sec: 67
    link_id: 4
    duration_sec: 3
    comment: "Link 4 brief outage (cut short by test end)"

expected_capacity:
  - time_sec: 0
    total_kbps: 4000
    comment: "All links operational"
  - time_sec: 10
    total_kbps: 3000
    comment: "Link 1 out"
  - time_sec: 22
    total_kbps: 4000
    comment: "Link 1 restored"
  - time_sec: 30
    total_kbps: 3000
    comment: "Link 2 out"
  - time_sec: 40
    total_kbps: 4000
    comment: "Link 2 restored"
  - time_sec: 48
    total_kbps: 3000
    comment: "Link 3 out"
  - time_sec: 63
    total_kbps: 4000
    comment: "Link 3 restored"

pipeline:
  encoder_bitrate_kbps: 2200
  test_pattern: "ball"
  resolution: "640x480"
  framerate: 30
  keyframe_interval: 60
